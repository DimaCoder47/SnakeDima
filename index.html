<!DOCTYPE HTML>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <style id="operaUserStyle"></style>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>🐍RETRO SNAKE 2D🐍</title>

    <link rel="stylesheet" href="style.css">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#080808">
    <link rel="icon" href="android-chrome-192x192.png" sizes="192x192">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
</head>

<body>

    <!-- Start Screen -->
    <div id="start-screen">
        <div class="system-bar">
        <div id="date-time">00.00.2026 | 00:00</div>
        <div id="battery-status">BAT: 100%</div>
    </div>

    <!-- Logo-Container -->
    <div class="logo-container">
        <h1 class="game-title">
            RETRO<br>
            <span class="snake-placeholder">🐍</span>NAKE 2D
        </h1>
        <!-- Subtitle -->
        <p class="subtitle">CAN YOU REACH THE 170 LIMIT?</p>
    </div>
    <!-- Play-Button -->
    <button id="play-button">▶ START GAME</button>
    <!-- Signatur -->
    <div class="copyright">© 2026 DIMA | ALL RIGHTS RESERVED</div>
</div>

    <div id="ui-wrapper">
        <div id="game-container">
            <header id="score-wrapper">
                <button id="pause-btn">II</button>
                <span id="score-display">Score: 0</span>
                <span id="highscore-display">Best: 0</span>
            </header>

                <canvas id="canvas"></canvas>

            <div id="mobile-controls">
                <button id="left-btn" class="ctrl-btn">◀</button>
                <button id="up-btn" class="ctrl-btn">▲</button>
                <button id="down-btn" class="ctrl-btn">▼</button>
                <button id="right-btn" class="ctrl-btn">▶</button>
            </div>
        </div>
    </div>

    <div id="highscore-overlay" style="display: none;">
        <div class="overlay-content">
            <h1>NEUER REKORD!</h1>
            <p id="final-score-text">Score: 0</p>
            <button id="again-btn" onclick="resetGameAfterHighscore()">AGAIN</button>
        </div>
    </div>


    <script src="config.js"></script>
    <script src="input.js"></script>
    <script src="game.js"></script>
</body>

</html>
