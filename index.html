<!DOCTYPE HTML>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>🐍Severus Snape🐍</title>

    <link rel="stylesheet" href="style.css">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#080808">
    <link rel="icon" href="android-chrome-192x192.png" sizes="192x192">
</head>

<body>

    <div id="ui-wrapper">
        <div id="game-container">
            <header id="score-wrapper">
                    <button id="pause-btn">II</button>
                    <span id="score-display">Score: 0</span>
                    <span id="highscore-display">Best: 0</span>
            </header>

            <canvas id="canvas"></canvas>
        </div>
    </div>

    <div id="highscore-overlay" style="display: none;">
        <div class="overlay-content">
            <h1>NEUER REKORD!</h1>
            <p id="final-score-text">Score: 0</p>
            <button id="again-btn" onclick="resetGameAfterHighscore()">AGAIN</button>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="input.js"></script>
    <script src="game.js"></script>
</body>

</html>
